<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#f6f3ee;--surface:#fff;--surface2:#f0ece4;--text:#1c1410;--muted:#8a7560;--accent:#7c3d12;--accent-light:#f5ede3;--border:#e2d9cc;--gold:#d4a87a;--radius:12px;--shadow:0 2px 12px rgba(0,0,0,.07)}
body{font-family:"Heebo",sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
body.rtl{direction:rtl}body.ltr{direction:ltr}
header{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px}
.hi{max-width:960px;margin:0 auto;height:72px;display:flex;align-items:center;justify-content:space-between}
.logo{display:flex;align-items:center;gap:16px}
.lb{width:52px;height:52px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.lb svg{width:30px;height:30px}
.lt{display:flex;flex-direction:column;gap:1px}
.ln{font-size:22px;font-weight:700;color:var(--accent);letter-spacing:3px;font-family:Georgia,serif;line-height:1}
.ld{height:1px;background:var(--gold);margin:3px 0}
.ls{font-size:9.5px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.ltag{font-size:10px;color:var(--gold);font-weight:500}
.hr{display:flex;align-items:center;gap:10px}
.lsw{display:flex;border:1px solid var(--border);border-radius:8px;overflow:hidden}
.lb2{background:none;border:none;padding:7px 11px;font-size:12px;font-weight:600;cursor:pointer;color:var(--muted);font-family:"Heebo",sans-serif;transition:all .15s}
.lb2:not(:last-child){border-left:1px solid var(--border)}
body.rtl .lb2:not(:last-child){border-left:none;border-right:1px solid var(--border)}
.lb2.active{background:var(--accent);color:#fff}
.lb2:hover:not(.active){background:var(--surface2)}
.hbtn{background:var(--accent);color:#fff;border:none;padding:9px 16px;border-radius:8px;font-family:"Heebo",sans-serif;font-size:13px;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px}
.hbtn:hover{opacity:.88}
.tb{background:var(--surface);border-bottom:1px solid var(--border);padding:0 28px}
.ti{max-width:960px;margin:0 auto;display:flex;gap:4px;overflow-x:auto;padding:10px 0}
.tab{padding:7px 16px;border-radius:6px;border:1px solid transparent;background:none;font-family:"Heebo",sans-serif;font-size:13px;cursor:pointer;color:var(--muted);white-space:nowrap;transition:all .15s}
.tab:hover{background:var(--surface2)}
.tab.active{background:var(--accent-light);border-color:var(--gold);color:var(--accent);font-weight:600}
.main{max-width:960px;margin:0 auto;padding:28px}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:28px}
.stat{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px 16px}
.sv{font-size:22px;font-weight:700;color:var(--accent);line-height:1}
.sl{font-size:11px;color:var(--muted);margin-top:4px}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sh h2{font-size:15px;font-weight:700}
.sh span{font-size:12px;color:var(--muted)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:box-shadow .15s,transform .15s;overflow:hidden}
.card:hover{box-shadow:var(--shadow);transform:translateY(-2px)}
.cs{height:4px}.cb{padding:16px}
.cr{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.badge{font-size:11px;font-weight:600;padding:3px 9px;border-radius:4px}
.b-basic{background:#e6f4ea;color:#1e6e3a}.b-adv{background:#fdeaea;color:#a32020}.b-mid{background:#fff4e0;color:#a05c00}.b-pup{background:#e8f0fe;color:#1a53a0}
.ct{font-size:11px;color:var(--muted)}
.card h3{font-size:15px;font-weight:700;margin-bottom:6px;line-height:1.4}
.cd{font-size:12px;color:var(--muted);line-height:1.65;margin-bottom:12px}
.ctags{display:flex;gap:6px;flex-wrap:wrap}
.tag{font-size:11px;padding:3px 8px;background:var(--surface2);border-radius:4px;color:var(--muted)}
.cf{padding:10px 16px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.cc{font-size:11px;color:var(--muted)}.ar{font-size:13px;color:var(--accent);font-weight:700}
.det{display:none;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius)}.det.on{display:block}
.dh{padding:20px 24px;border-bottom:1px solid var(--border);display:flex;gap:14px}
.di{width:48px;height:48px;border-radius:10px;display:grid;place-items:center;font-size:22px;flex-shrink:0}
.dht h2{font-size:22px;font-weight:900;line-height:1.2;margin-bottom:6px}

function setTab(c){C=c;renderTabs();renderGrid();hideDet()}
function renderGrid(){const t=T[L];const all=t.cats[0];const f=C===all?t.data:t.data.filter(g=>g.cat===C);document.getElementById("stitle").textContent=C===all?t.all:C;document.getElementById("scnt").textContent=`${f.length} ${t.g}`;document.getElementById("grid").innerHTML=f.map(g=>`<div class="card" onclick="showDet(${g.id})"><div class="cs" style="background:${g.col}"></div><div class="cb"><div class="cr"><span class="badge ${g.ba}">${g.lb}</span><span class="ct">⏱ ${g.time}</span></div><h3>${g.title}</h3><p class="cd">${g.desc}</p><div class="ctags">${g.tags.map(tag=>`<span class="tag">${tag}</span>`).join("")}</div></div><div class="cf"><span class="cc">${g.cat}</span><span class="ar">${t.read}</span></div></div>`).join("");document.getElementById("grid").style.display="grid"}
function showDet(id){const t=T[L];const g=t.data.find(x=>x.id===id);if(!g)return;document.getElementById("grid").style.display="none";const d=document.getElementById("det");d.classList.add("on");d.innerHTML=`<div class="br"><button class="bbtn" onclick="hideDet()">${t.back}</button><span style="font-size:12px;color:var(--muted)"> / ${g.title}</span></div><div class="dh"><div class="di" style="background:${g.bg}">🐾</div><div class="dht"><h2>${g.title}</h2><div class="dbd"><span class="badge ${g.ba}">${g.lb}</span><span class="badge" style="background:var(--surface2);color:var(--muted)">⏱ ${g.time}</span>${g.tags.map(tag=>`<span class="tag">${tag}</span>`).join("")}</div></div></div><div class="dbody"><p class="dd">${g.desc}</p><div style="font-size:11px;font-weight:700;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${t.steps}</div><div class="sg">${g.steps.map((s,i)=>`<div class="sc"><div class="sn" style="background:${g.col}">${i+1}</div><div><div class="st">${s.t}</div><div class="sd">${s.d}</div></div></div>`).join("")}</div><div class="tc"><div style="font-size:18px">💡</div><div><div class="ttl">${t.tip}</div><div class="ttx">${g.tip}</div></div></div><button class="abtn" onclick="askAbout('${g.title}')">${t.ask}</button></div>`}
function hideDet(){document.getElementById("det").classList.remove("on");document.getElementById("grid").style.display="grid"}
function toggleChat(){chatOpen=!chatOpen;document.getElementById("cp").classList.toggle("on",chatOpen);document.getElementById("fab").style.display=chatOpen?"none":"flex"}
function askAbout(title){if(!chatOpen)toggleChat();const ci=document.getElementById("ci");const t=T[L];ci.value=L==="he"?`יש לי שאלה על "${title}" – `:L==="fr"?`J'ai une question sur "${title}" – `:`I have a question about "${title}" – `;ci.focus()}
async function send(){const ci=document.getElementById("ci"),text=ci.value.trim();if(!text)return;const sb=document.getElementById("sb");sb.disabled=true;ci.value="";const t=T[L];const msgs=document.getElementById("msgs");msgs.innerHTML+=`<div class="m u">${text}</div><div class="m a" id="thi" style="opacity:.5;font-style:italic">${t.think}</div>`;msgs.scrollTop=msgs.scrollHeight;try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:t.sys,messages:[{role:"user",content:text}]})});const d=await r.json();document.getElementById("thi").remove();msgs.innerHTML+=`<div class="m a">${(d.content?.[0]?.text||"Error").replace(/\n/g,"<br>")}</div>`}catch{document.getElementById("thi").remove();msgs.innerHTML+=`<div class="m a">⚠️ Error</div>`}sb.disabled=false;msgs.scrollTop=msgs.scrollHeight}
setLang("he");
</script>
