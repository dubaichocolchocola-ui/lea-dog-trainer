<script>
(function(){
  // Draw Lea logo on canvas → base64 icon
  const c = document.createElement('canvas');
  c.width = 512; c.height = 512;
  const ctx = c.getContext('2d');

  // Background circle
  ctx.fillStyle = '#f6f3ee';
  ctx.fillRect(0, 0, 512, 512);

  // Brown circle
  ctx.beginPath();
  ctx.arc(256, 256, 220, 0, Math.PI * 2);
  ctx.fillStyle = '#7c3d12';
  ctx.fill();

  // Inner lighter ring
  ctx.beginPath();
  ctx.arc(256, 256, 200, 0, Math.PI * 2);
  ctx.fillStyle = '#9b4f1a';
  ctx.fill();

  // Paw print - main pad
  ctx.beginPath();
  ctx.ellipse(256, 290, 75, 60, 0, 0, Math.PI * 2);
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  ctx.fill();

  // Paw - top left toe
  ctx.beginPath();
  ctx.ellipse(185, 215, 35, 30, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // Paw - top right toe
  ctx.beginPath();
  ctx.ellipse(327, 215, 35, 30, 0.3, 0, Math.PI * 2);
  ctx.fill();

  // Paw - mid left toe
  ctx.beginPath();
  ctx.ellipse(210, 175, 30, 26, -0.5, 0, Math.PI * 2);
  ctx.fill();

  // Paw - mid right toe
  ctx.beginPath();
  ctx.ellipse(302, 175, 30, 26, 0.5, 0, Math.PI * 2);
  ctx.fill();

  // LEA text
  ctx.fillStyle = 'white';
  ctx.font = 'bold 96px Georgia, serif';
  ctx.textAlign = 'center';
  ctx.letterSpacing = '8px';
  ctx.fillText('LEA', 256, 420);

  // Gold divider line under LEA
  ctx.strokeStyle = '#d4a87a';
  ctx.lineWidth = 4;
  ctx.beginPath();
  ctx.moveTo(140, 430);
  ctx.lineTo(372, 430);
  ctx.stroke();

  const dataUrl = c.toDataURL('image/png');

  // Set apple touch icon
  document.getElementById('apple-icon').href = dataUrl;

  // Set manifest
  const manifest = {
    name: 'Lea Dog Trainer',
    short_name: 'Lea',
    start_url: '.',
    display: 'standalone',
    background_color: '#f6f3ee',
    theme_color: '#7c3d12',
    icons: [
      { src: dataUrl, sizes: '512x512', type: 'image/png' },
      { src: dataUrl, sizes: '192x192', type: 'image/png' }
    ]
  };
  const blob = new Blob([JSON.stringify(manifest)], {type: 'application/json'});
  document.getElementById('manifest-placeholder').href = URL.createObjectURL(blob);
})();
</script>

let L="he",C=null,chatOpen=false;
function setLang(l){L=l;const t=T[l];document.documentElement.lang=l;document.body.className=t.dir==="rtl"?"rtl":"ltr";document.getElementById("ltag").textContent=t.tag;document.getElementById("cbl").textContent=t.cbl;document.getElementById("fabl").textContent=t.cbl;document.getElementById("ci").placeholder=t.ph;document.querySelectorAll(".lb2").forEach(b=>b.classList.remove("active"));document.querySelector(`.lb2[onclick="setLang('${l}')"]`).classList.add("active");C=t.cats[0];document.getElementById("msgs").innerHTML=`<div class="m a">${t.greet}</div>`;renderStats();renderTabs();renderGrid();hideDet()}
function renderStats(){const t=T[L];document.getElementById("stats").innerHTML=t.stats.map(s=>`<div class="stat"><div class="sv">${s.v}</div><div class="sl">${s.l}</div></div>`).join("")}
function renderTabs(){const t=T[L];document.getElementById("tabs").innerHTML=t.cats.map(c=>`<button class="tab${c===C?" active":""}" onclick="setTab('${c}')">${c}</button>`).join("")}
function setTab(c){C=c;renderTabs();renderGrid();hideDet()}
function renderGrid(){const t=T[L];const all=t.cats[0];const f=C===all?t.data:t.data.filter(g=>g.cat===C);document.getElementById("stitle").textContent=C===all?t.all:C;document.getElementById("scnt").textContent=`${f.length} ${t.g}`;document.getElementById("grid").innerHTML=f.map(g=>`<div class="card" onclick="showDet(${g.id})"><div class="cs" style="background:${g.col}"></div><div class="cb"><div class="cr"><span class="badge ${g.ba}">${g.lb}</span><span class="ct">⏱ ${g.time}</span></div><h3>${g.title}</h3><p class="cd">${g.desc}</p><div class="ctags">${g.tags.map(tag=>`<span class="tag">${tag}</span>`).join("")}</div></div><div class="cf"><span class="cc">${g.cat}</span><span class="ar">${t.read}</span></div></div>`).join("");document.getElementById("grid").style.display="grid"}
function showDet(id){const t=T[L];const g=t.data.find(x=>x.id===id);if(!g)return;document.getElementById("grid").style.display="none";const d=document.getElementById("det");d.classList.add("on");d.innerHTML=`<div class="br"><button class="bbtn" onclick="hideDet()">${t.back}</button><span style="font-size:12px;color:var(--muted)"> / ${g.title}</span></div><div class="dh"><div class="di" style="background:${g.bg}">🐾</div><div class="dht"><h2>${g.title}</h2><div class="dbd"><span class="badge ${g.ba}">${g.lb}</span><span class="badge" style="background:var(--surface2);color:var(--muted)">⏱ ${g.time}</span>${g.tags.map(tag=>`<span class="tag">${tag}</span>`).join("")}</div></div></div><div class="dbody"><p class="dd">${g.desc}</p><div style="font-size:11px;font-weight:700;margin-bottom:12px;color:var(--muted);text-transform:uppercase;letter-spacing:1px">${t.steps}</div><div class="sg">${g.steps.map((s,i)=>`<div class="sc"><div class="sn" style="background:${g.col}">${i+1}</div><div><div class="st">${s.t}</div><div class="sd">${s.d}</div></div></div>`).join("")}</div><div class="tc"><div style="font-size:18px">💡</div><div><div class="ttl">${t.tip}</div><div class="ttx">${g.tip}</div></div></div><button class="abtn" onclick="askAbout('${g.title}')">${t.ask}</button></div>`}
function hideDet(){document.getElementById("det").classList.remove("on");document.getElementById("grid").style.display="grid"}
function toggleChat(){chatOpen=!chatOpen;document.getElementById("cp").classList.toggle("on",chatOpen);document.getElementById("fab").style.display=chatOpen?"none":"flex"}
function askAbout(title){if(!chatOpen)toggleChat();const ci=document.getElementById("ci");const t=T[L];ci.value=L==="he"?`יש לי שאלה על "${title}" – `:L==="fr"?`J'ai une question sur "${title}" – `:`I have a question about "${title}" – `;ci.focus()}
async function send(){const ci=document.getElementById("ci"),text=ci.value.trim();if(!text)return;const sb=document.getElementById("sb");sb.disabled=true;ci.value="";const t=T[L];const msgs=document.getElementById("msgs");msgs.innerHTML+=`<div class="m u">${text}</div><div class="m a" id="thi" style="opacity:.5;font-style:italic">${t.think}</div>`;msgs.scrollTop=msgs.scrollHeight;try{const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:1000,system:t.sys,messages:[{role:"user",content:text}]})});const d=await r.json();document.getElementById("thi").remove();msgs.innerHTML+=`<div class="m a">${(d.content?.[0]?.text||"Error").replace(/\n/g,"<br>")}</div>`}catch{document.getElementById("thi").remove();msgs.innerHTML+=`<div class="m a">⚠️ Error</div>`}sb.disabled=false;msgs.scrollTop=msgs.scrollHeight}
setLang("he");
</script>
